name: Build and Deploy ClientApp to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install ClientApp dependencies
        run: npm ci --prefix KeepCowsFat.Web/ClientApp

      - name: Build ClientApp
        run: npm run build --prefix KeepCowsFat.Web/ClientApp

      - name: Ensure .nojekyll, 404 fallback, and add CNAME
        run: |
          DIST=KeepCowsFat.Web/ClientApp/dist
          if [ ! -d "$DIST" ]; then
            echo "Build output not found at $DIST" >&2
            ls -la KeepCowsFat.Web/ClientApp || true
            exit 1
          fi
          # prevent Jekyll processing and add SPA fallback
          touch "$DIST/.nojekyll"
          cp "$DIST/index.html" "$DIST/404.html" || true
          # add your custom domain CNAME so Pages will use it
          echo "www.projectfoodify.gov" > "$DIST/CNAME"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: KeepCowsFat.Web/ClientApp/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1