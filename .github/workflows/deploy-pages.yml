name: Build and Deploy ClientApp to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # explicit job-level permissions to ensure GITHUB_TOKEN can push
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ensure the runner keeps credentials so further git pushes can authenticate
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install ClientApp dependencies
        run: npm ci
        working-directory: KeepCowsFat.Web/ClientApp

      - name: Build ClientApp
        run: npm run build
        working-directory: KeepCowsFat.Web/ClientApp

      - name: Prepare dist (CNAME / .nojekyll / 404)
        run: |
          DIST=KeepCowsFat.Web/ClientApp/dist
          if [ ! -d "$DIST" ]; then
            echo "Build output not found at $DIST" >&2
            ls -la KeepCowsFat.Web/ClientApp || true
            exit 1
          fi
          touch "$DIST/.nojekyll"
          cp "$DIST/index.html" "$DIST/404.html" || true
          echo "www.projectfoodify.gov" > "$DIST/CNAME"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # use the workflow token (GITHUB_TOKEN) — job-level permissions above must allow write
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: KeepCowsFat.Web/ClientApp/dist
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          force_orphan: true
